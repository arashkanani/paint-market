<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>Business registration</title>
  <link rel="icon" type="image/png" href="/paint/img/brand/paintik-icon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/paint/css/paint-market-ui.css" />
  <style>body { font-family: "DM Sans", system-ui, sans-serif; }</style>
</head>
<body class="min-h-screen bg-gradient-to-b from-slate-950 via-slate-900 to-slate-100 text-slate-900">
  <main class="min-h-screen flex items-center justify-center px-4 py-8">
    <section class="w-full max-w-md rounded-3xl bg-white/95 p-6 shadow-2xl border border-white/20">
      <a href="/paint/" class="pm-brand-logo-link pm-brand-logo-link--center mb-5" aria-label="PAINTIK">
        <img src="/paint/img/brand/paintik-logo.png" alt="PAINTIK" class="pm-brand-logo-link__img pm-brand-logo-link__img--lg" width="140" height="40" decoding="async" />
      </a>
      <h1 class="text-2xl font-extrabold text-slate-950" data-pm-t="business_register_title">Business verification</h1>
      <p id="businessTypeLabel" class="mt-1 text-sm font-semibold text-teal-700"></p>
      <p class="mt-2 text-sm text-slate-500" data-pm-t="business_register_sub">Upload your company document and sign the terms to submit your application.</p>

      <form id="businessForm" class="mt-5 space-y-4">
        <div>
          <label class="text-xs font-semibold text-slate-600" data-pm-t="business_company_name">Company name</label>
          <input name="companyName" required class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 outline-none ring-teal-500/30 focus:ring-4" />
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-600" data-pm-t="business_contact_name">Contact person</label>
          <input name="contactName" required class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 outline-none ring-teal-500/30 focus:ring-4" />
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-600" data-pm-t="register_phone">Business phone (optional)</label>
          <input name="phone" type="tel" inputmode="tel" autocomplete="tel" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 outline-none ring-teal-500/30 focus:ring-4" />
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-600" data-pm-t="register_city_label">City / area</label>
          <div class="mt-1 grid sm:grid-cols-2 gap-3">
            <select name="locationCountry" class="paint-market-shop-country rounded-lg border border-slate-200 px-3 py-2 text-sm" aria-label="Country"></select>
            <select name="locationCity" class="paint-market-shop-city rounded-lg border border-slate-200 px-3 py-2 text-sm" aria-label="City"></select>
          </div>
          <input name="locationArea" data-pm-shop-location-area class="mt-3 w-full rounded-lg border border-slate-200 px-3 py-2 outline-none ring-teal-500/30 focus:ring-4" data-pm-ph="register_loc_area_ph" placeholder="e.g. Al Khuwair" />
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-600" data-pm-t="business_document">Company document</label>
          <input name="document" type="file" required accept=".pdf,.png,.jpg,.jpeg,.webp" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm file:mr-3 file:rounded-lg file:border-0 file:bg-teal-50 file:px-3 file:py-1.5 file:text-teal-700" />
          <p class="mt-1 text-xs text-slate-400" data-pm-t="business_document_hint">Upload trade license, tax document, or company registration.</p>
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-600" data-pm-t="business_terms_signature">Type your full name as signature</label>
          <input name="termsSignature" required class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 outline-none ring-teal-500/30 focus:ring-4" />
        </div>
        <label class="flex items-start gap-2 text-sm text-slate-600">
          <input name="termsAccepted" type="checkbox" required class="mt-1 accent-teal-700" />
          <span data-pm-t="business_terms_accept">I agree to the terms and conditions and confirm the uploaded company document is valid.</span>
        </label>
        <button class="w-full rounded-lg bg-teal-700 text-white py-2.5 font-semibold hover:bg-teal-800" type="submit" data-pm-t="business_submit">Submit application</button>
      </form>
      <p id="businessError" class="mt-4 hidden text-sm text-rose-600"></p>
      <p id="businessSuccess" class="mt-4 hidden rounded-xl bg-teal-50 p-3 text-sm text-teal-800" data-pm-t="business_success">Application submitted. We will review your documents.</p>
    </section>
  </main>

  <script src="/paint/js/paint-i18n.js"></script>
  <script src="/paint/js/common.js"></script>
  <script>
    const form = document.getElementById("businessForm");
    const errorEl = document.getElementById("businessError");
    const successEl = document.getElementById("businessSuccess");
    const typeLabel = document.getElementById("businessTypeLabel");
    const params = new URLSearchParams(window.location.search);
    const type = params.get("type") || sessionStorage.getItem("paint_register_account_type") || "";
    const email = sessionStorage.getItem("paint_register_email") || "";
    const password = sessionStorage.getItem("paint_register_password") || "";
    const labels = {
      shop: paintMarketT("account_type_shop"),
      wholesaler: paintMarketT("account_type_wholesaler"),
      raw_supplier: paintMarketT("account_type_raw_supplier")
    };
    if (!["shop", "wholesaler", "raw_supplier"].includes(type) || !email || !password) {
      window.location.href = "/paint/account.html";
    }
    typeLabel.textContent = labels[type] || "";
    paintMarketInitShopLocationForm(form, "");

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.remove("hidden");
      successEl.classList.add("hidden");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.classList.add("hidden");
      const fd = new FormData(form);
      const phoneRaw = String(fd.get("phone") || "").trim();
      if (phoneRaw && typeof paintMarketValidatePhone === "function") {
        const country = String(fd.get("locationCountry") || paintMarketCountryGet() || "OM");
        const phoneCheck = paintMarketValidatePhone(phoneRaw, country);
        if (!phoneCheck.ok) {
          showError(paintMarketT("register_phone_invalid"));
          return;
        }
        fd.set("phone", phoneCheck.normalized);
      }
      fd.append("email", email);
      fd.append("password", password);
      fd.append("accountType", type);
      fd.append("location", paintMarketReadShopLocationFields(form));
      fd.set("termsAccepted", fd.get("termsAccepted") ? "1" : "0");
      try {
        await PaintApi.registerBusiness(fd);
        sessionStorage.removeItem("paint_register_email");
        sessionStorage.removeItem("paint_register_password");
        sessionStorage.removeItem("paint_register_account_type");
        form.classList.add("hidden");
        successEl.classList.remove("hidden");
      } catch (err) {
        showError(err.message || paintMarketT("register_err"));
      }
    });
  </script>
</body>
</html>
