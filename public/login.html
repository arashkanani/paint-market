<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/paint/css/paint-market-ui.css" />
  <style>body { font-family: "DM Sans", system-ui, sans-serif; }</style>
</head>
<body class="bg-gradient-to-b from-slate-950 via-slate-900 to-slate-100 min-h-screen flex flex-col" data-pm-page-title="login_metaTitle">
  <header class="border-b border-white/20 bg-slate-950/90 backdrop-blur shrink-0 z-30">
    <div class="max-w-6xl mx-auto px-4 py-2.5 flex flex-wrap items-center justify-between gap-x-4 gap-y-2">
      <p class="text-sm font-medium text-slate-200" data-pm-t="login_shop_portal">Shop portal</p>
      <div class="flex flex-wrap items-center gap-3">
        <button type="button" class="pm-geo-compact-btn md:hidden" aria-label="Country, city &amp; language">
          <span class="pm-geo-compact-inner">
            <span class="pm-geo-compact-flag" aria-hidden="true"></span>
            <span class="pm-geo-compact-sep" aria-hidden="true">·</span>
            <span class="pm-geo-sym-city" aria-hidden="true">⌖</span>
            <span class="pm-geo-compact-sep" aria-hidden="true">·</span>
            <span class="pm-geo-sym-lang" aria-hidden="true">En</span>
          </span>
        </button>
        <div class="pm-geo-bar-desktop hidden md:flex flex-wrap items-center gap-3">
          <label class="flex items-center gap-2">
            <span class="text-[11px] font-semibold uppercase tracking-wide text-slate-300 whitespace-nowrap" data-pm-t="hdr_language">Language</span>
            <select
              class="paint-market-lang paint-market-header-select rounded-lg border border-white/20 text-sm px-2.5 py-1.5 min-w-[6.5rem] shadow-sm focus:ring-2 focus:ring-teal-500/50"
              aria-label="Language"
            ></select>
          </label>
        </div>
        <a class="text-sm text-teal-300 hover:text-teal-200 font-medium" href="/paint/" data-pm-t="login_home">Home</a>
      </div>
    </div>
  </header>
  <div class="flex-1 flex items-center justify-center px-4 py-10">
  <div class="w-full max-w-md rounded-3xl border border-white/20 bg-white/95 p-7 shadow-2xl space-y-5">
    <div>
      <h1 class="text-2xl font-semibold" data-pm-t="login_h1">Login</h1>
      <p class="mt-1 text-sm text-slate-600" data-pm-t="login_intro">Shops maintain catalogues here. Administrators use the same form.</p>
    </div>
    <form id="form" class="space-y-4">
      <div>
        <label class="text-xs font-semibold text-slate-600" data-pm-t="login_email">Email</label>
        <input name="email" type="email" required class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 outline-none ring-teal-500/30 focus:ring-4" />
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-600" data-pm-t="login_password">Password</label>
        <input name="password" type="password" required class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 outline-none ring-teal-500/30 focus:ring-4" />
      </div>
      <button class="w-full rounded-lg bg-teal-700 text-white py-2.5 font-medium hover:bg-teal-800" type="submit" data-pm-t="login_submit">Login</button>
    </form>
    <p class="text-sm text-slate-600"><span data-pm-t="login_footer">Need a storefront?</span> <a class="text-teal-700 font-semibold" href="/paint/register.html" data-pm-t="login_footer_link">Register shop</a></p>
    <p id="error" class="text-sm text-rose-600 hidden"></p>
  </div>
  </div>
  <script src="/paint/js/paint-i18n.js"></script>
  <script src="/paint/js/common.js"></script>
  <script>
    const form = document.getElementById("form");
    const errorEl = document.getElementById("error");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.classList.add("hidden");
      const fd = new FormData(form);
      try {
        const data = await PaintApi.login({ email: fd.get("email"), password: fd.get("password") });
        if (data.user.role === "admin") window.location.href = "/paint/admin.html";
        else window.location.href = "/paint/dashboard.html";
      } catch (err) {
        errorEl.textContent = err.message || paintMarketT("login_err_failed");
        errorEl.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
