<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/paint/css/paint-market-ui.css" />
  <style>body { font-family: "DM Sans", system-ui, sans-serif; }</style>
</head>
<body class="bg-gradient-to-b from-slate-950 via-slate-900 to-slate-100 min-h-screen flex flex-col" data-pm-page-title="register_metaTitle">
  <header class="border-b border-white/20 bg-slate-950/90 backdrop-blur shrink-0 z-30">
    <div class="max-w-6xl mx-auto px-4 py-2.5 flex flex-wrap items-center justify-between gap-x-6 gap-y-2">
      <label class="flex items-center gap-2">
        <span class="text-[11px] font-semibold uppercase tracking-wide text-slate-300 whitespace-nowrap" data-pm-t="hdr_country">Country</span>
        <select
          class="paint-market-country paint-market-header-select rounded-lg border border-white/20 text-sm px-2.5 py-1.5 shadow-sm focus:ring-2 focus:ring-teal-500/50"
          aria-label="Country"
        ></select>
      </label>
      <label class="flex items-center gap-2">
        <span class="text-[11px] font-semibold uppercase tracking-wide text-slate-300 whitespace-nowrap" data-pm-t="hdr_city">City</span>
        <select
          class="paint-market-city paint-market-header-select rounded-lg border border-white/20 text-sm px-2.5 py-1.5 min-w-[9rem] shadow-sm focus:ring-2 focus:ring-teal-500/50"
          aria-label="City"
        ></select>
      </label>
      <label class="flex items-center gap-2">
        <span class="text-[11px] font-semibold uppercase tracking-wide text-slate-300 whitespace-nowrap" data-pm-t="hdr_language">Language</span>
        <select
          class="paint-market-lang paint-market-header-select rounded-lg border border-white/20 text-sm px-2.5 py-1.5 min-w-[6.5rem] shadow-sm focus:ring-2 focus:ring-teal-500/50"
          aria-label="Language"
        ></select>
      </label>
      <a class="text-sm text-teal-300 hover:text-teal-200 font-medium" href="/paint/" data-pm-t="login_home">Home</a>
    </div>
  </header>
  <div class="flex-1 flex items-center justify-center px-4 py-10">
  <div class="w-full max-w-md rounded-3xl border border-white/20 bg-white/95 p-7 shadow-2xl space-y-5">
    <div>
      <h1 class="text-2xl font-semibold" data-pm-t="register_h1">Create a shop account</h1>
      <p class="mt-1 text-sm text-slate-600" data-pm-t="register_intro">Use your business email—you will upload showroom photos and price the shared master catalogue.</p>
    </div>
    <form id="form" class="space-y-4">
      <div>
        <label class="text-xs font-semibold text-slate-600" data-pm-t="register_email">Business email</label>
        <input name="email" type="email" required class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 outline-none ring-teal-500/30 focus:ring-4" />
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-600" data-pm-t="register_password">Password</label>
        <input name="password" type="password" required minlength="6" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 outline-none ring-teal-500/30 focus:ring-4" />
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-600" data-pm-t="register_shop_name">Shop name</label>
        <input name="shopName" required class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 outline-none ring-teal-500/30 focus:ring-4" />
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-600" data-pm-t="register_city_label">City / area — customers search this</label>
        <input name="location" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 outline-none ring-teal-500/30 focus:ring-4" data-pm-ph="register_city_ph" placeholder="e.g. Dubai · Marina" />
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-600" data-pm-t="register_address_label">Street address or directions (optional)</label>
        <textarea name="address" rows="2" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none ring-teal-500/30 focus:ring-4" data-pm-ph="register_address_ph" placeholder="Shown on your showroom page and shop cards"></textarea>
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-600" data-pm-t="register_phone">Phone (optional)</label>
        <input name="phone" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 outline-none ring-teal-500/30 focus:ring-4" />
      </div>
      <button class="w-full rounded-lg bg-teal-700 text-white py-2.5 font-medium hover:bg-teal-800" type="submit" data-pm-t="register_submit">Create shop</button>
    </form>
    <p class="text-sm text-slate-600"><span data-pm-t="register_footer">Already have an account?</span> <a class="text-teal-700 font-semibold" href="/paint/login.html" data-pm-t="register_footer_link">Login</a></p>
    <p id="error" class="text-sm text-rose-600 hidden"></p>
  </div>
  </div>
  <script src="/paint/js/paint-i18n.js"></script>
  <script src="/paint/js/common.js"></script>
  <script>
    const form = document.getElementById("form");
    const errorEl = document.getElementById("error");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.classList.add("hidden");
      const fd = new FormData(form);
      try {
        await PaintApi.registerShop({
          email: fd.get("email"),
          password: fd.get("password"),
          shopName: fd.get("shopName"),
          location: fd.get("location"),
          address: fd.get("address"),
          phone: fd.get("phone")
        });
        window.location.href = "/paint/dashboard.html";
      } catch (err) {
        errorEl.textContent = err.message || paintMarketT("register_err");
        errorEl.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
