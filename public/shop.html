<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="PAINTIK" />
  <meta name="theme-color" content="#0f766e" />
  <link rel="manifest" href="/paint/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/paint/img/brand/paintik-icon.png" />
  <script src="/paint/js/paint-pwa.js?v=20260601e"></script>
  <title>Shop showroom</title>
  <link rel="icon" type="image/png" href="/paint/img/brand/paintik-icon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/paint/css/shop-photo-frame.css" />
  <link rel="stylesheet" href="/paint/css/paint-market-ui.css" />
  <link rel="stylesheet" href="/paint/css/paint-market-brand-icons.css" />
  <link rel="stylesheet" href="/paint/css/shop-brand-cylinder.css?v=20260531c" />
  <link rel="stylesheet" href="/paint/css/pindex-pfinder.css?v=20260601h" />
  <style>body { font-family: "DM Sans", system-ui, sans-serif; }</style>
  <link rel="stylesheet" href="/paint/css/paint-app-shell.css?v=20260601i" />
</head>
<body class="pm-shop-page text-slate-900 min-h-screen bg-slate-50" data-pm-page-title="shop_metaTitle">
  <main class="pm-page-shell pm-shop-page-main py-6 space-y-6">
    <section class="pm-shop-hero pm-shop-hero-bar w-full max-w-full min-w-0">
      <div class="pm-shop-hero-bar__row">
        <div class="pm-shop-hero-bar__logo shop-photo-frame pm-shop-hero-bar__logo-frame">
          <img id="heroImg" alt="" class="shop-photo-frame__img" loading="lazy" />
        </div>
        <div class="pm-shop-hero-bar__title">
          <h1 id="shopName" class="min-w-0">Loading…</h1>
          <button
            type="button"
            id="shopFavBtn"
            class="paint-market-fav-btn hidden shrink-0"
            aria-hidden="true"
          ></button>
        </div>
        <div class="pm-shop-hero-bar__actions">
          <button
            type="button"
            id="shopInfoBtn"
            class="pm-shop-hero-bar__btn pm-shop-hero-bar__btn--info"
            aria-expanded="false"
            aria-controls="shopInfoDropdown"
          >
            <span data-pm-t="shop_info_btn">Description</span>
          </button>
          <a
            id="openDirectionsMap"
            href="#"
            target="_blank"
            rel="noopener noreferrer"
            class="pm-shop-hero-bar__btn pm-shop-hero-bar__btn--dir hidden"
            data-pm-t="shop_get_directions"
          >Get directions</a>
        </div>
      </div>
      <div id="shopInfoDropdown" class="pm-shop-hero-info-drop" hidden>
        <div class="pm-shop-hero-info-drop__inner" aria-label="Shop information">
          <p id="locationText" class="pm-shop-hero-info-drop__line"></p>
          <p id="addressText" class="pm-shop-hero-info-drop__line"></p>
          <p id="phoneText" class="pm-shop-hero-info-drop__line pm-shop-hero-info-drop__line--phone" hidden>
            <span class="pm-shop-hero-info-drop__label" data-pm-t="shop_info_phone">Phone</span>
            <span id="phoneTextValue"></span>
          </p>
          <p class="pm-shop-hero-info-drop__line pm-shop-hero-info-drop__line--muted">
            <span data-pm-t="index_last_update">Last update:</span>
            <span id="lastUpdated"></span>
          </p>
          <a
            id="openExtMap"
            href="#"
            target="_blank"
            rel="noopener noreferrer"
            class="pm-shop-hero-info-drop__map-link hidden"
            data-pm-t="shop_map_hint"
          >Show on map</a>
        </div>
      </div>
    </section>

    <div id="errorBox" class="hidden rounded-xl border border-rose-200 bg-rose-50 text-rose-800 px-4 py-3 text-sm"></div>

    <section class="pm-shop-catalog" id="shopCatalog">
      <div class="pm-shop-catalog__main">
        <div id="shopBrandInside" class="pm-shop-brand-inside hidden" hidden aria-hidden="true">
          <button type="button" id="shopBrandInsideBack" class="pm-shop-brand-inside__back" data-pm-t="shop_brand_back">← All brands</button>
          <div id="shopBrandInsideTitle" class="pm-shop-brand-inside__title"></div>
        </div>

        <div id="shopListingPanel" class="pm-shop-listing-section space-y-3">
          <div id="shopListingHead">
            <h2 class="text-xl" data-pm-t="shop_listed_h2">All products</h2>
          </div>
          <div class="shop-listing-pills hidden flex flex-wrap gap-2 text-xs font-semibold" aria-hidden="true">
            <button data-quick="building_paints" type="button" class="pill px-3 py-1 rounded-full bg-white border border-slate-200">Building</button>
            <button data-quick="steel_workshop_paints" type="button" class="pill px-3 py-1 rounded-full bg-white border border-slate-200">Steel</button>
            <button data-quick="carpentry_workshop_paints" type="button" class="pill px-3 py-1 rounded-full bg-white border border-slate-200">Wood</button>
            <button data-quick="thinner" type="button" class="pill px-3 py-1 rounded-full bg-white border border-slate-200">Thinner</button>
            <button data-quick="industrial" type="button" class="pill px-3 py-1 rounded-full bg-white border border-slate-200">Industrial</button>
            <button data-quick="road_marking" type="button" class="pill px-3 py-1 rounded-full bg-white border border-slate-200">Road marking</button>
            <button data-quick="water_proofing" type="button" class="pill px-3 py-1 rounded-full bg-white border border-slate-200">Water proofing</button>
            <button data-quick="epoxy_flooring" type="button" class="pill px-3 py-1 rounded-full bg-white border border-slate-200">Epoxy flooring</button>
            <button data-quick="" type="button" class="pill px-3 py-1 rounded-full bg-teal-800 text-white">All</button>
          </div>
          <div id="listingMount" class="space-y-4"></div>
        </div>
      </div>
    </section>
  </main>

  <nav class="pm-pfinder-bottom-nav" aria-label="Main navigation">
    <a href="/paint/" class="pm-pfinder-bottom-nav__item">
      <span class="pm-pfinder-bottom-nav__icon" aria-hidden="true">⌂</span>
      <span data-pm-t="index_nav_home">Home</span>
    </a>
    <a href="/paint/browse.html" class="pm-pfinder-bottom-nav__item">
      <span class="pm-pfinder-bottom-nav__icon" aria-hidden="true">☰</span>
      <span data-pm-t="index_nav_browse">Browse</span>
    </a>
    <div class="pm-pfinder-bottom-nav__fab-wrap">
      <a href="/paint/register.html" class="pm-pfinder-bottom-nav__fab" title="Register shop" aria-label="Add listing">+</a>
    </div>
    <a href="/paint/" class="pm-pfinder-bottom-nav__item is-active" aria-current="page">
      <span class="pm-pfinder-bottom-nav__icon" aria-hidden="true">🏪</span>
      <span data-pm-t="index_nav_shops">Shops</span>
    </a>
    <a href="/paint/login.html" class="pm-pfinder-bottom-nav__item">
      <span class="pm-pfinder-bottom-nav__icon" aria-hidden="true">👤</span>
      <span data-pm-t="index_nav_account">Account</span>
    </a>
  </nav>

  <script src="/paint/js/paint-i18n.js"></script>
  <script src="/paint/js/ral-colors.js"></script>
  <script src="/paint/js/common.js"></script>
  <script src="/paint/js/theme.js"></script>
  <script>
    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, (c) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[c]));
    }

    const params = new URLSearchParams(location.search);
    const slug = params.get("slug");
    const focusProductId = Number(params.get("productId"));
    const focusQuery = String(params.get("q") || "").trim();
    const focusCapacityRaw = params.get("capacityLtr");
    const focusCapacity =
      typeof PaintApi !== "undefined" ? PaintApi.normalizeCapacityLtr(focusCapacityRaw) : null;
    const heroImg = document.getElementById("heroImg");

    function setupPublicShopLinks(shop) {
      const link = document.getElementById("openExtMap");
      const dir = document.getElementById("openDirectionsMap");
      if (!link || !dir) return false;
      const locationQuery = [shop.name, shop.location_text, shop.address].filter(Boolean).join(", ");
      if (!locationQuery) return false;
      dir.classList.remove("hidden");
      link.classList.remove("hidden");
      const mlat = shop.lat != null ? Number(shop.lat) : NaN;
      const mlng = shop.lng != null ? Number(shop.lng) : NaN;
      if (Number.isFinite(mlat) && Number.isFinite(mlng)) {
        link.href = `https://www.google.com/maps?q=${encodeURIComponent(mlat)},${encodeURIComponent(mlng)}`;
        dir.href = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(`${mlat},${mlng}`)}`;
      } else {
        const encodedQuery = encodeURIComponent(locationQuery);
        link.href = `https://www.google.com/maps/search/?api=1&query=${encodedQuery}`;
        dir.href = `https://www.google.com/maps/dir/?api=1&destination=${encodedQuery}`;
      }
      return true;
    }

    function initShopInfoDropdown() {
      const btn = document.getElementById("shopInfoBtn");
      const panel = document.getElementById("shopInfoDropdown");
      if (!btn || !panel || btn.dataset.bound === "1") return;
      btn.dataset.bound = "1";

      function setOpen(open) {
        panel.hidden = !open;
        btn.setAttribute("aria-expanded", open ? "true" : "false");
        btn.classList.toggle("is-open", open);
      }

      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        setOpen(panel.hidden);
      });
      document.addEventListener("click", (e) => {
        if (panel.hidden) return;
        if (!panel.contains(e.target) && !btn.contains(e.target)) setOpen(false);
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && !panel.hidden) setOpen(false);
      });
    }
    let listings = [];
    let shopCustomColors = [];
    let categoryFilter = "";
    let capacityFilter = "";
    let brandFilter = "";
    let sortMode = "popular";
    let shopPageHydrated = false;

    function listingCapacityLtr(row) {
      return PaintApi.normalizeCapacityLtr(row.capacity_ltr ?? row.capacityLtr);
    }

    const SHOP_PILL_I18N = {
      building_paints: "shop_pill_building",
      steel_workshop_paints: "shop_pill_steel",
      carpentry_workshop_paints: "shop_pill_carpentry",
      thinner: "shop_pill_thinner",
      industrial: "shop_pill_industrial",
      road_marking: "shop_pill_road_marking",
      water_proofing: "shop_pill_water_proofing",
      epoxy_flooring: "shop_pill_epoxy_flooring",
      "": "shop_pill_all"
    };

    function translateShopPills() {
      document.querySelectorAll(".pill").forEach((btn) => {
        const q = btn.getAttribute("data-quick") ?? "";
        const key =
          Object.prototype.hasOwnProperty.call(SHOP_PILL_I18N, q) ? SHOP_PILL_I18N[q] : null;
        if (!key) return;
        const label = paintMarketT(key);
        const iconUrl = q ? paintMarketCategoryIconUrl(q) : "";
        if (iconUrl) {
          btn.classList.add("pill--with-icon");
          btn.innerHTML = `<img class="shop-pill-icon" src="${esc(iconUrl)}" alt="" loading="lazy" /><span>${esc(label)}</span>`;
        } else {
          btn.classList.remove("pill--with-icon");
          btn.textContent = label;
        }
      });
    }

    document.getElementById("shopName").textContent = paintMarketT("shop_loading");

    async function activate(card, listingId) {
      card.classList.add("ring-2", "ring-teal-600");
      await PaintApi.trackListing(listingId);
    }

    function sortRows(rows) {
      const next = [...rows];
      if (sortMode === "price-asc") next.sort((a, b) => Number(a.price_amount) - Number(b.price_amount));
      if (sortMode === "price-desc") next.sort((a, b) => Number(b.price_amount) - Number(a.price_amount));
      if (sortMode === "name") next.sort((a, b) => a.product_name.localeCompare(b.product_name));
      if (sortMode === "popular") {
        next.sort((a, b) => {
          const scoreA = Number(a.popularity_score || 0) + Number(a.view_count || 0);
          const scoreB = Number(b.popularity_score || 0) + Number(b.view_count || 0);
          return scoreB - scoreA;
        });
      }
      return next;
    }

    function formatCapacityLtr(v) {
      const n = Number(v);
      return Number.isFinite(n) ? String(n) : String(v ?? "");
    }

    /** Amazon-style card: image on top, title + price below. */
    function shopProductCardBodyHtml(row) {
      const productName = row.product_name || row.productName || "";
      const imgSrc =
        typeof paintMarketProductImageUrl === "function"
          ? esc(paintMarketProductImageUrl(row))
          : esc(row.custom_photo_url || row.default_image_url || row.imageUrl || "");
      const cap = formatCapacityLtr(row.capacity_ltr ?? row.capacityLtr);
      const cur = row.currency || (typeof paintMarketCurrencyGet === "function" ? paintMarketCurrencyGet() : "AED");
      const amt = row.price_amount ?? row.priceAmount;
      const priceStr =
        amt != null && amt !== ""
          ? typeof paintMarketFormatPrice === "function"
            ? paintMarketFormatPrice(amt, cur)
            : String(amt)
          : "";
      const ral = String(row.ral_code ?? row.ralCode ?? "").trim();
      const meta = [];
      if (cap) meta.push(`${cap}L`);
      if (ral) meta.push(ral.toUpperCase().startsWith("RAL") ? ral : `RAL ${ral}`);
      const metaHtml = meta.length
        ? `<p class="pm-shop-amazon-card__meta">${esc(meta.join(" · "))}</p>`
        : "";
      const priceHtml = priceStr
        ? `<p class="pm-shop-amazon-card__price">${esc(priceStr)}</p>`
        : "";
      return `<div class="pm-shop-amazon-card__media"><img class="pm-shop-amazon-card__img" src="${imgSrc}" alt="" loading="lazy" /></div><div class="pm-shop-amazon-card__body"><p class="pm-shop-amazon-card__title">${esc(productName)}</p>${priceHtml}${metaHtml}</div>`;
    }

    function scrollShopProductsToTop() {
      const catalog = document.getElementById("shopCatalog");
      const y = catalog ? catalog.getBoundingClientRect().top + window.scrollY - 10 : 0;
      window.scrollTo({ top: Math.max(0, y), behavior: "smooth" });
    }

    function listingMasterProductId(row) {
      const id = Number(row.master_product_id ?? row.masterProductId ?? row.product_id ?? row.productId);
      return Number.isFinite(id) && id > 0 ? id : null;
    }

    function sortFocusListings(rows) {
      const next = sortRows(rows);
      if (focusCapacity == null) return next;
      return next.sort((a, b) => {
        const aMatch = listingCapacityLtr(a) === focusCapacity ? 0 : 1;
        const bMatch = listingCapacityLtr(b) === focusCapacity ? 0 : 1;
        return aMatch - bMatch;
      });
    }

    function appendListingGrid(parent, rows, opts = {}) {
      if (!rows.length) return;
      const grid = document.createElement("div");
      grid.className = "pm-shop-amazon-grid";
      for (const row of rows) {
        const card = document.createElement("article");
        card.className = "pm-shop-amazon-card group cursor-pointer select-none";
        if (opts.highlight) card.classList.add("pm-shop-amazon-card--search-focus");
        card.dataset.listingId = String(row.id);
        card.innerHTML = shopProductCardBodyHtml(row);
        card.addEventListener("click", () => activate(card, row.id));
        grid.appendChild(card);
      }
      parent.appendChild(grid);
    }

    function renderList(opts) {
      const scrollTop = opts && opts.scrollTop;
      const listingMount = document.getElementById("listingMount");
      const listingPanel = document.getElementById("shopListingPanel");
      const listingHead = document.getElementById("shopListingHead");
      if (!listingMount || !listingPanel) return;
      listingPanel.classList.remove("hidden");
      listingMount.innerHTML = "";
      if (listingHead) listingHead.innerHTML = "";
      if (!listings.length) {
        if (listingHead) {
          listingHead.innerHTML = `<h2 class="text-xl" data-pm-t="shop_listed_h2">${esc(paintMarketT("shop_listed_h2"))}</h2>`;
        }
        listingMount.innerHTML = `<div class="pm-shop-listing-empty"><p class="text-sm text-slate-500">${esc(paintMarketT("shop_empty_listings"))}</p></div>`;
        if (scrollTop) requestAnimationFrame(() => scrollShopProductsToTop());
        return;
      }
      const filtered = sortRows(
        listings.filter((l) => {
          if (brandFilter && String(l.brand_slug || "").toLowerCase() !== brandFilter) return false;
          if (
            categoryFilter &&
            String(l.category_slug || "").trim().toLowerCase() !== categoryFilter
          )
            return false;
          if (capacityFilter !== "") {
            const cap = listingCapacityLtr(l);
            if (cap == null || String(cap) !== capacityFilter) return false;
          }
          return true;
        })
      );
      if (!filtered.length) {
        if (listingHead) {
          listingHead.innerHTML = `<h2 class="text-xl" data-pm-t="shop_listed_h2">${esc(paintMarketT("shop_listed_h2"))}</h2>`;
        }
        listingMount.innerHTML = `<div class="pm-shop-listing-empty"><p class="text-sm text-slate-500">${esc(paintMarketT("shop_empty_filter"))}</p></div>`;
        if (scrollTop) requestAnimationFrame(() => scrollShopProductsToTop());
        return;
      }

      const hasFocusProduct = Number.isFinite(focusProductId) && focusProductId > 0;
      let focusRows = [];
      let otherRows = filtered;
      if (hasFocusProduct) {
        focusRows = sortFocusListings(
          filtered.filter((row) => listingMasterProductId(row) === focusProductId)
        );
        if (focusRows.length) {
          otherRows = filtered.filter((row) => listingMasterProductId(row) !== focusProductId);
        }
      }

      if (focusRows.length) {
        const focusSection = document.createElement("section");
        focusSection.className = "pm-shop-search-focus space-y-2";
        const productTitle = focusRows[0].product_name || paintMarketT("shop_from_search");
        focusSection.innerHTML = `<h2 class="pm-shop-search-focus__title text-lg font-semibold text-slate-900">${esc(productTitle)}</h2>`;
        appendListingGrid(focusSection, focusRows, { highlight: true });
        listingMount.appendChild(focusSection);

        if (otherRows.length) {
          const moreSection = document.createElement("section");
          moreSection.className = "pm-shop-search-more space-y-2";
          moreSection.innerHTML = `<h2 class="pm-shop-search-more__title text-lg font-semibold text-slate-900">${esc(paintMarketT("shop_more_products"))}</h2>`;
          appendListingGrid(moreSection, otherRows);
          listingMount.appendChild(moreSection);
        }
      } else {
        if (listingHead) {
          listingHead.innerHTML = `<h2 class="text-xl" data-pm-t="shop_listed_h2">${esc(paintMarketT("shop_listed_h2"))}</h2>`;
        }
        appendListingGrid(listingMount, filtered);
      }

      if (scrollTop || focusRows.length || focusQuery) requestAnimationFrame(() => scrollShopProductsToTop());
    }

    PaintTheme.paintShopFilterRow();
    initShopInfoDropdown();

    (async () => {
      const errorBox = document.getElementById("errorBox");
      if (!slug) {
        errorBox.textContent = paintMarketT("shop_err_slug");
        errorBox.classList.remove("hidden");
        return;
      }
      try {
        const data = await PaintApi.shopPublic(slug);
        const shop = data.shop;
        document.getElementById("shopName").textContent = shop.name;
        const shopFavBtn = document.getElementById("shopFavBtn");
        if (shopFavBtn && shop.slug) {
          shopFavBtn.classList.remove("hidden");
          shopFavBtn.removeAttribute("aria-hidden");
          paintMarketFavoriteApplyButton(shopFavBtn, shop.slug, "inline");
        }
        const locEl = document.getElementById("locationText");
        const addrEl = document.getElementById("addressText");
        locEl.textContent = shop.location_text || "—";
        locEl.hidden = !String(shop.location_text || "").trim();
        addrEl.textContent = shop.address || "—";
        addrEl.hidden = !String(shop.address || "").trim();
        const phoneWrap = document.getElementById("phoneText");
        const phoneVal = document.getElementById("phoneTextValue");
        if (phoneWrap && phoneVal) {
          phoneVal.textContent = shop.phone || "—";
          phoneWrap.hidden = !String(shop.phone || "").trim();
        }
        document.getElementById("lastUpdated").textContent =
          shop.last_catalog_update || paintMarketT("index_last_update_na");
        setupPublicShopLinks(shop);
        const heroSrc = shop.photo_url || `https://placehold.co/1200x400/064e3b/f8fafc?text=${encodeURIComponent(shop.name)}`;
        heroImg.src = heroSrc;
        listings = data.listings || [];
        shopCustomColors = data.customColors || [];
        shopPageHydrated = true;
        renderList();
      } catch (e) {
        errorBox.textContent =
          e.message === "Forbidden"
            ? paintMarketT("shop_err_forbidden")
            : e.message || paintMarketT("shop_err_load");
        errorBox.classList.remove("hidden");
      }
    })();

    document.addEventListener("paint-market-lang-change", () => {
      if (!shopPageHydrated) document.getElementById("shopName").textContent = paintMarketT("shop_loading");
      translateShopPills();
      renderList();
    });

    document.addEventListener("paint-market-favorites-change", () => {
      const fb = document.getElementById("shopFavBtn");
      const sl = fb && fb.getAttribute("data-shop-slug");
      if (fb && sl) paintMarketFavoriteApplyButton(fb, sl, "inline");
    });
  </script>
</body>
</html>
