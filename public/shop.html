<!DOCTYPE html>

<head>

  <script src="https://cdn.tailwindcss.com"></script>

<body class="text-slate-900 min-h-screen" data-pm-page-title="shop_metaTitle">
  <header class="sticky top-0 z-30 border-b border-white/20 bg-slate-950/80 backdrop-blur">
    <div class="pm-header-bar max-w-6xl mx-auto px-2 sm:px-4 py-2 sm:py-3 flex flex-nowrap items-center justify-between gap-1 sm:gap-3 min-w-0">
      <div class="flex flex-nowrap items-center gap-1.5 sm:gap-2 min-w-0 shrink-0">
        <button type="button" class="pm-geo-compact-btn md:hidden shrink-0" aria-label="Country, city &amp; language">
          <span class="pm-geo-compact-inner">
            <span class="pm-geo-compact-flag" aria-hidden="true"></span>
            <span class="pm-geo-compact-sep" aria-hidden="true">·</span>
            <span class="pm-geo-sym-city" aria-hidden="true">⌖</span>
            <span class="pm-geo-compact-sep" aria-hidden="true">·</span>
            <span class="pm-geo-sym-lang" aria-hidden="true">En</span>
          </span>
        </button>
        <div class="pm-geo-bar-desktop hidden md:flex flex-nowrap items-center gap-x-3 gap-y-0 min-w-0">
          <label class="pm-country-field flex items-center gap-1.5 shrink-0 min-w-0">
            <span class="text-[11px] font-semibold uppercase tracking-wide text-slate-300 whitespace-nowrap" data-pm-t="hdr_country">Country</span>
            <span class="pm-select-with-flag pm-select-with-flag--header">
              <span class="pm-country-flag" aria-hidden="true"></span>
              <select
                class="paint-market-country paint-market-header-select rounded-lg border border-white/20 text-sm py-1.5 pe-2.5 ps-9 shadow-sm focus:ring-2 focus:ring-teal-500/50 max-w-[9.5rem]"
                aria-label="Country"
              ></select>
            </span>
          </label>
          <label class="flex items-center gap-1.5 shrink-0 min-w-0">
            <span class="text-[11px] font-semibold uppercase tracking-wide text-slate-300 whitespace-nowrap" data-pm-t="hdr_city">City</span>
            <select
              class="paint-market-city paint-market-header-select rounded-lg border border-white/20 text-sm px-2 py-1.5 min-w-0 max-w-[8.5rem] shadow-sm focus:ring-2 focus:ring-teal-500/50"
              aria-label="City"
            ></select>
          </label>
          <label class="flex items-center gap-1.5 shrink-0 min-w-0">
            <span class="text-[11px] font-semibold uppercase tracking-wide text-slate-300 whitespace-nowrap" data-pm-t="hdr_language">Language</span>
            <select
              class="paint-market-lang paint-market-header-select rounded-lg border border-white/20 text-sm px-2 py-1.5 min-w-0 max-w-[6.5rem] shadow-sm focus:ring-2 focus:ring-teal-500/50"
              aria-label="Language"

        </div>

      <nav class="pm-header-nav flex flex-nowrap items-center gap-1 sm:gap-2 min-w-0 shrink">
        <a class="pm-header-nav-link px-2 py-1 sm:px-3 sm:py-1.5 rounded-lg border border-white/20 text-slate-200 hover:bg-white/10" href="/paint/" data-pm-t="shop_browse">Browse shops</a>
        <a class="pm-header-nav-link px-2 py-1 sm:px-3 sm:py-1.5 rounded-lg bg-teal-500 text-slate-950 hover:bg-teal-400 font-semibold" href="/paint/login.html" data-pm-t="shop_shop_login">Shop login</a>

  <main class="max-w-[min(1920px,100%)] mx-auto px-3 sm:px-4 py-8 space-y-8">
    <section class="pm-shop-hero pm-shop-hero-bar w-full max-w-full min-w-0">

        <div class="pm-shop-hero-bar__logo shop-photo-frame pm-shop-hero-bar__logo-frame">
          <img id="heroImg" alt="" class="shop-photo-frame__img" loading="lazy" />
        </div>

          <button
            type="button"

            class="paint-market-fav-btn hidden shrink-0"

          ></button>
        </div>
        <div class="pm-shop-hero-bar__actions">
          <button
            type="button"
            id="shopInfoBtn"
            class="pm-shop-hero-bar__btn pm-shop-hero-bar__btn--info"
            aria-expanded="false"

          </button>
          <a

            target="_blank"
            rel="noopener noreferrer"
            class="pm-shop-hero-bar__btn pm-shop-hero-bar__btn--dir hidden"
            data-pm-t="shop_get_directions"

      <div id="shopInfoDropdown" class="pm-shop-hero-info-drop" hidden>
        <div class="pm-shop-hero-info-drop__inner" aria-label="Shop information">

          <p id="addressText" class="pm-shop-hero-info-drop__line"></p>
          <p id="phoneText" class="pm-shop-hero-info-drop__line pm-shop-hero-info-drop__line--phone" hidden>
            <span class="pm-shop-hero-info-drop__label" data-pm-t="shop_info_phone">Phone</span>

          </p>
          <p class="pm-shop-hero-info-drop__line pm-shop-hero-info-drop__line--muted">

    <section class="pm-shop-catalog" id="shopCatalog">
      <div id="shopFilterBackdrop" class="pm-shop-filter-drawer__backdrop" hidden aria-hidden="true"></div>
      <button
        type="button"
        id="shopFilterDrawerTab"
        class="pm-shop-filter-drawer__peek"

      </button>

          <button type="button" id="shopPrismPrev" class="pm-brand-prism__arrow pm-brand-prism__arrow--up" aria-label="Previous brand">

        </div>
        <div class="pm-shop-category-filter">

            <button type="button" id="shopCatPrismPrev" class="pm-brand-prism__arrow pm-brand-prism__arrow--up" aria-label="Previous category">
              <span aria-hidden="true">▲</span>
            </button>
            <div class="pm-brand-prism__viewport" id="shopCatPrismViewport">
              <div class="pm-brand-prism__scene">
                <div class="pm-brand-prism__camera">
                  <div class="pm-brand-prism__drum" id="shopCatPrismDrum">
                    <div class="pm-brand-prism__wire" id="shopCatPrismWire" aria-hidden="true"></div>

            <button data-quick="industrial" type="button" class="pill px-3 py-1 rounded-full bg-white border border-slate-200">Industrial</button>

  <script src="/paint/js/paint-i18n.js"></script>
  <script src="/paint/js/ral-colors.js"></script>
  <script src="/paint/js/common.js"></script>
  <script src="/paint/js/theme.js"></script>
  <script src="/paint/js/shop-brand-cylinder.js"></script>
  <script>
    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, (c) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[c]));
    }

    const params = new URLSearchParams(location.search);
    const slug = params.get("slug");
    const heroImg = document.getElementById("heroImg");
    const listingMount = document.getElementById("listingMount");

    function setupPublicShopLinks(shop) {
      const link = document.getElementById("openExtMap");
      const dir = document.getElementById("openDirectionsMap");
      if (!link || !dir) return false;
      const locationQuery = [shop.name, shop.location_text, shop.address].filter(Boolean).join(", ");
      if (!locationQuery) return false;
      dir.classList.remove("hidden");
      link.classList.remove("hidden");
      const mlat = shop.lat != null ? Number(shop.lat) : NaN;
      const mlng = shop.lng != null ? Number(shop.lng) : NaN;
      if (Number.isFinite(mlat) && Number.isFinite(mlng)) {
        link.href = `https://www.google.com/maps?q=${encodeURIComponent(mlat)},${encodeURIComponent(mlng)}`;
        dir.href = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(`${mlat},${mlng}`)}`;
      } else {
        const encodedQuery = encodeURIComponent(locationQuery);
        link.href = `https://www.google.com/maps/search/?api=1&query=${encodedQuery}`;
        dir.href = `https://www.google.com/maps/dir/?api=1&destination=${encodedQuery}`;
      }
      return true;
    }

    function initShopInfoDropdown() {
      const btn = document.getElementById("shopInfoBtn");
      const panel = document.getElementById("shopInfoDropdown");
      if (!btn || !panel || btn.dataset.bound === "1") return;
      btn.dataset.bound = "1";

      function setOpen(open) {
        panel.hidden = !open;
        btn.setAttribute("aria-expanded", open ? "true" : "false");
        btn.classList.toggle("is-open", open);
      }

      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        setOpen(panel.hidden);
      });
      document.addEventListener("click", (e) => {
        if (panel.hidden) return;
        if (!panel.contains(e.target) && !btn.contains(e.target)) setOpen(false);
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && !panel.hidden) setOpen(false);
      });
    }
    let listings = [];
    let shopCustomColors = [];
    let categoryFilter = "";
    let capacityFilter = "";
    let brandFilter = "";
    let sortMode = "popular";
    let shopPageHydrated = false;
    let scrollProductsOnFilter = false;
    let brandPrism = null;
    let categoryPrism = null;
    let capacityPrism = null;

    const SHOP_CAPACITY_ORDER = [1, 3.6, 18];

    function shopCategorySlugOrder() {
      if (typeof paintMarketDefaultBrowseCategories === "function") {
        return paintMarketDefaultBrowseCategories().map((c) => c.slug);
      }
      return [
        "building_paints",
        "steel_workshop_paints",
        "carpentry_workshop_paints",
        "thinner",
        "industrial",
        "road_marking",
        "water_proofing",
        "epoxy_flooring"
      ];
    }

    function shopBrandsFromListings() {
      const map = new Map();
      for (const l of listings) {
        const slug = String(l.brand_slug || "").trim();
        if (!slug || map.has(slug)) continue;
        map.set(slug, {
          slug,
          name: l.brand_name || slug,
          sort_order: Number(l.brand_order) || 99
        });
      }
      return [...map.values()].sort(
        (a, b) => a.sort_order - b.sort_order || String(a.name).localeCompare(String(b.name))
      );
    }

    function shopCapacityLabelLtr(cap) {
      const n = Number(cap);
      if (!Number.isFinite(n)) return String(cap ?? "");
      if (Math.abs(n - 1) < 0.001) return "1L";
      if (Math.abs(n - 3.6) < 0.001) return "3.6L";
      if (Math.abs(n - 18) < 0.001) return "18L";
      return `${n}L`;
    }

    function listingCapacityLtr(row) {
      return PaintApi.normalizeCapacityLtr(row.capacity_ltr ?? row.capacityLtr);
    }

    function shopCapacitiesFromListings() {
      const caps = new Set();
      for (const l of listings) {
        const c = listingCapacityLtr(l);
        if (c != null) caps.add(c);
      }
      const ordered = SHOP_CAPACITY_ORDER.filter((c) => caps.has(c));
      const rest = [...caps].filter((c) => !ordered.includes(c)).sort((a, b) => a - b);
      return [...ordered, ...rest].map((cap) => ({
        slug: String(cap),
        name: shopCapacityLabelLtr(cap)
      }));
    }

    /** All hub categories on the prism (same as main page), plus any extra slugs from this shop. */
    function shopCategoriesFromListings() {
      const inShop = new Set();
      for (const l of listings) {
        const s = String(l.category_slug || "").trim().toLowerCase();
        if (s) inShop.add(s);
      }
      const order = shopCategorySlugOrder();
      const slugs = [];
      const seen = new Set();
      for (const s of order) {
        if (seen.has(s)) continue;
        seen.add(s);
        slugs.push(s);
      }
      for (const s of [...inShop].filter((x) => !seen.has(x)).sort()) {
        seen.add(s);
        slugs.push(s);
      }
      return slugs.map((slug) => ({
        slug,
        name: paintMarketCategoryLabel(slug, "")
      }));
    }

    const SHOP_PILL_I18N = {
      building_paints: "shop_pill_building",
      steel_workshop_paints: "shop_pill_steel",
      carpentry_workshop_paints: "shop_pill_carpentry",
      thinner: "shop_pill_thinner",
      industrial: "shop_pill_industrial",
      road_marking: "shop_pill_road_marking",
      water_proofing: "shop_pill_water_proofing",
      epoxy_flooring: "shop_pill_epoxy_flooring",
      "": "shop_pill_all"
    };

    function translateShopPills() {
      document.querySelectorAll(".pill").forEach((btn) => {
        const q = btn.getAttribute("data-quick") ?? "";
        const key =
          Object.prototype.hasOwnProperty.call(SHOP_PILL_I18N, q) ? SHOP_PILL_I18N[q] : null;
        if (!key) return;
        const label = paintMarketT(key);
        const iconUrl = q ? paintMarketCategoryIconUrl(q) : "";
        if (iconUrl) {
          btn.classList.add("pill--with-icon");
          btn.innerHTML = `<img class="shop-pill-icon" src="${esc(iconUrl)}" alt="" loading="lazy" /><span>${esc(label)}</span>`;
        } else {
          btn.classList.remove("pill--with-icon");
          btn.textContent = label;
        }
      });
    }

    document.getElementById("shopName").textContent = paintMarketT("shop_loading");

    async function activate(card, listingId) {
      card.classList.add("ring-2", "ring-teal-600");
      await PaintApi.trackListing(listingId);
    }

    function sortRows(rows) {
      const next = [...rows];
      if (sortMode === "price-asc") next.sort((a, b) => Number(a.price_amount) - Number(b.price_amount));
      if (sortMode === "price-desc") next.sort((a, b) => Number(b.price_amount) - Number(a.price_amount));
      if (sortMode === "name") next.sort((a, b) => a.product_name.localeCompare(b.product_name));
      if (sortMode === "popular") {
        next.sort((a, b) => {
          const scoreA = Number(a.popularity_score || 0) + Number(a.view_count || 0);
          const scoreB = Number(b.popularity_score || 0) + Number(b.view_count || 0);
          return scoreB - scoreA;
        });
      }
      return next;
    }

    function formatCapacityLtr(v) {
      const n = Number(v);
      return Number.isFinite(n) ? String(n) : String(v ?? "");
    }

    /** Amazon-style card: image on top, title + price below. */
    function shopProductCardBodyHtml(row) {
      const productName = row.product_name || row.productName || "";
      const imgSrc =
        typeof paintMarketProductImageUrl === "function"
          ? esc(paintMarketProductImageUrl(row))
          : esc(row.custom_photo_url || row.default_image_url || row.imageUrl || "");
      const cap = formatCapacityLtr(row.capacity_ltr ?? row.capacityLtr);
      const cur = row.currency || (typeof paintMarketCurrencyGet === "function" ? paintMarketCurrencyGet() : "AED");
      const amt = row.price_amount ?? row.priceAmount;
      const priceStr =
        amt != null && amt !== ""
          ? typeof paintMarketFormatPrice === "function"
            ? paintMarketFormatPrice(amt, cur)
            : String(amt)
          : "";
      const ral = String(row.ral_code ?? row.ralCode ?? "").trim();
      const meta = [];
      if (cap) meta.push(`${cap}L`);
      if (ral) meta.push(ral.toUpperCase().startsWith("RAL") ? ral : `RAL ${ral}`);
      const metaHtml = meta.length
        ? `<p class="pm-shop-amazon-card__meta">${esc(meta.join(" · "))}</p>`
        : "";
      const priceHtml = priceStr
        ? `<p class="pm-shop-amazon-card__price">${esc(priceStr)}</p>`
        : "";
      return `<div class="pm-shop-amazon-card__media"><img class="pm-shop-amazon-card__img" src="${imgSrc}" alt="" loading="lazy" /></div><div class="pm-shop-amazon-card__body"><p class="pm-shop-amazon-card__title">${esc(productName)}</p>${priceHtml}${metaHtml}</div>`;
    }

    function scrollShopProductsToTop() {
      const catalog = document.getElementById("shopCatalog");
      const y = catalog ? catalog.getBoundingClientRect().top + window.scrollY - 10 : 0;
      window.scrollTo({ top: Math.max(0, y), behavior: "smooth" });
    }

    function renderList(opts) {
      const scrollTop = opts && opts.scrollTop;
      const listingMount = document.getElementById("listingMount");
      const listingPanel = document.getElementById("shopListingPanel");
      if (!listingMount || !listingPanel) return;
      listingPanel.classList.remove("hidden");
      listingMount.innerHTML = "";
      if (!listings.length) {
        listingMount.innerHTML = `<div class="pm-shop-listing-empty"><p class="text-sm text-slate-500">${esc(paintMarketT("shop_empty_listings"))}</p></div>`;
        if (scrollTop) requestAnimationFrame(() => scrollShopProductsToTop());
        return;
      }
      const filtered = sortRows(
        listings.filter((l) => {
          if (brandFilter && String(l.brand_slug || "").toLowerCase() !== brandFilter) return false;
          if (
            categoryFilter &&
            String(l.category_slug || "").trim().toLowerCase() !== categoryFilter
          )
            return false;
          if (capacityFilter !== "") {
            const cap = listingCapacityLtr(l);
            if (cap == null || String(cap) !== capacityFilter) return false;
          }
          return true;
        })
      );
      if (!filtered.length) {
        listingMount.innerHTML = `<div class="pm-shop-listing-empty"><p class="text-sm text-slate-500">${esc(paintMarketT("shop_empty_filter"))}</p></div>`;
        if (scrollTop) requestAnimationFrame(() => scrollShopProductsToTop());
        return;
      }
      const grid = document.createElement("div");
      grid.className = "pm-shop-amazon-grid";
      listingMount.appendChild(grid);
      for (const row of filtered) {
        const card = document.createElement("article");
        card.className = "pm-shop-amazon-card group cursor-pointer select-none";
        card.dataset.listingId = String(row.id);
        card.innerHTML = shopProductCardBodyHtml(row);
        card.addEventListener("click", () => activate(card, row.id));
        grid.appendChild(card);
      }
      if (scrollTop) requestAnimationFrame(() => scrollShopProductsToTop());
    }

    function renderListFromFilter() {
      renderList({ scrollTop: scrollProductsOnFilter });
    }

    function initBrandPrism() {
      if (typeof initShopBrandCylinder !== "function") return;
      brandPrism = initShopBrandCylinder({
        layout: "sidebar",
        axis: "x",
        section: document.getElementById("shopBrandPrism"),
        viewport: document.getElementById("shopPrismViewport"),
        drum: document.getElementById("shopPrismDrum"),
        facesEl: document.getElementById("shopPrismFaces"),
        wireEl: document.getElementById("shopPrismWire"),
        edgesEl: document.getElementById("shopPrismEdges"),
        prevBtn: document.getElementById("shopPrismPrev"),
        nextBtn: document.getElementById("shopPrismNext"),
        insideBar: document.getElementById("shopBrandInside"),
        insideTitle: document.getElementById("shopBrandInsideTitle"),
        insideBack: document.getElementById("shopBrandInsideBack"),
        listingPanel: document.getElementById("shopListingPanel"),
        listingHead: document.getElementById("shopListingHead"),
        getBrands: shopBrandsFromListings,
        getListings: () => listings,
        faceHeightSidebar: 80,
        esc,
        t: paintMarketT,
        brandIconHtml: typeof paintMarketBrandIconHtml === "function" ? paintMarketBrandIconHtml : null,
        fitBrandMarks: typeof paintMarketScheduleFitBrandMarks === "function" ? paintMarketScheduleFitBrandMarks : null,
        applyI18n: typeof paintMarketApplyDomI18n === "function" ? paintMarketApplyDomI18n : null,
        onEnterBrand(slug) {
          brandFilter = slug ? String(slug).trim().toLowerCase() : "";
        },
        onRenderProducts: renderListFromFilter
      });
      brandPrism.render();
    }

    function updateShopCategoryCaption(slug) {
      const el = document.getElementById("shopCatPrismCaption");
      if (!el) return;
      const key = String(slug || "").trim().toLowerCase();
      el.textContent = key
        ? paintMarketCategoryLabel(key, "")
        : paintMarketT("shop_all_categories");
    }

    function initCategoryPrism() {
      if (typeof initShopFilterPrism !== "function") return;
      categoryPrism = initShopFilterPrism({
        layout: "sidebar",
        axis: "x",
        modExtraClass: "category",
        section: document.getElementById("shopCategoryPrism"),
        viewport: document.getElementById("shopCatPrismViewport"),
        drum: document.getElementById("shopCatPrismDrum"),
        facesEl: document.getElementById("shopCatPrismFaces"),
        wireEl: document.getElementById("shopCatPrismWire"),
        edgesEl: document.getElementById("shopCatPrismEdges"),
        prevBtn: document.getElementById("shopCatPrismPrev"),
        nextBtn: document.getElementById("shopCatPrismNext"),
        getItems: shopCategoriesFromListings,
        allLabelKey: "shop_all_categories",
        allFaceHtml: (name) =>
          typeof paintMarketPrismAllCategoriesHtml === "function"
            ? paintMarketPrismAllCategoriesHtml(name)
            : name,
        faceContentHtml: (item) =>
          typeof paintMarketCategoryPrismFaceHtml === "function"
            ? paintMarketCategoryPrismFaceHtml(item)
            : "",
        faceHeightSidebar: 80,
        esc,
        t: paintMarketT,
        applyI18n: typeof paintMarketApplyDomI18n === "function" ? paintMarketApplyDomI18n : null,
        onSelect(slug) {
          categoryFilter = slug ? String(slug).trim().toLowerCase() : "";
          updateShopCategoryCaption(slug);
        },
        onRenderProducts: renderListFromFilter
      });
      categoryPrism.render();
    }

    function initCapacityPrism() {
      if (typeof initShopFilterPrism !== "function") return;
      capacityPrism = initShopFilterPrism({
        layout: "sidebar",
        axis: "x",
        modExtraClass: "capacity",
        section: document.getElementById("shopCapacityPrism"),
        viewport: document.getElementById("shopCapPrismViewport"),
        drum: document.getElementById("shopCapPrismDrum"),
        facesEl: document.getElementById("shopCapPrismFaces"),
        wireEl: document.getElementById("shopCapPrismWire"),
        edgesEl: document.getElementById("shopCapPrismEdges"),
        prevBtn: document.getElementById("shopCapPrismPrev"),
        nextBtn: document.getElementById("shopCapPrismNext"),
        getItems: shopCapacitiesFromListings,
        allLabelKey: "shop_all_capacities",
        allFaceHtml: (name) =>
          typeof paintMarketPrismAllCapacitiesHtml === "function"
            ? paintMarketPrismAllCapacitiesHtml(name)
            : name,
        faceContentHtml: (item) =>
          typeof paintMarketCapacityPrismFaceHtml === "function"
            ? paintMarketCapacityPrismFaceHtml(item)
            : "",
        faceHeightSidebar: 44,
        esc,
        t: paintMarketT,
        fitBrandMarks: typeof paintMarketScheduleFitBrandMarks === "function" ? paintMarketScheduleFitBrandMarks : null,
        applyI18n: typeof paintMarketApplyDomI18n === "function" ? paintMarketApplyDomI18n : null,
        onSelect(slug) {
          capacityFilter = slug !== "" && slug != null ? String(slug) : "";
        },
        onRenderProducts: renderListFromFilter
      });
      capacityPrism.render();
    }

    function initShopFilterDrawer() {
      const drawer = document.getElementById("shopFilterDrawer");
      const tab = document.getElementById("shopFilterDrawerTab");
      const closeGrip = document.getElementById("shopFilterCloseGrip");
      const backdrop = document.getElementById("shopFilterBackdrop");
      if (!drawer || !tab || tab.dataset.bound === "1") return;
      tab.dataset.bound = "1";

      const EDGE_PX = 32;
      const SNAP_RATIO = 0.2;
      let drag = null;

      function isRtl() {
        return document.documentElement.getAttribute("dir") === "rtl";
      }

      function drawerOnRight() {
        return !isRtl();
      }

      function closedTranslateX() {
        const amount = drawer.offsetWidth;
        return drawerOnRight() ? amount : -amount;
      }

      function clampTranslateX(tx, closedX) {
        if (drawerOnRight()) return Math.max(0, Math.min(closedX, tx));
        return Math.min(0, Math.max(closedX, tx));
      }

      function clearInlineTransform() {
        drawer.classList.remove("is-dragging");
        drawer.style.transform = "";
      }

      function setOpen(open) {
        clearInlineTransform();
        drawer.classList.toggle("is-open", open);
        tab.classList.toggle("is-hidden", open);
        if (backdrop) {
          backdrop.hidden = !open;
          backdrop.classList.toggle("is-visible", open);
          backdrop.setAttribute("aria-hidden", open ? "false" : "true");
        }
        tab.setAttribute("aria-expanded", open ? "true" : "false");
        drawer.setAttribute("aria-hidden", open ? "false" : "true");
      }

      function pointerXY(e) {
        if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
        if (e.changedTouches && e.changedTouches.length) {
          return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
        }
        return { x: e.clientX, y: e.clientY };
      }

      function beginDrag(e, intent) {
        const p = pointerXY(e);
        drag = {
          intent,
          startX: p.x,
          startY: p.y,
          wasOpen: drawer.classList.contains("is-open"),
          closedX: closedTranslateX(),
          baseX: drawer.classList.contains("is-open") ? 0 : closedTranslateX()
        };
        drawer.classList.add("is-dragging");
        if (intent === "open" || intent === "edge") tab.classList.add("is-hidden");
      }

      function moveDrag(e) {
        if (!drag) return;
        const p = pointerXY(e);
        const dx = p.x - drag.startX;
        const dy = p.y - drag.startY;
        if (drag.intent === "edge") {
          if (Math.abs(dx) < Math.abs(dy)) return;
        }
        const tx = clampTranslateX(drag.baseX + dx, drag.closedX);
        drawer.style.transform = `translateX(${tx}px)`;
      }

      function endDrag(e) {
        if (!drag) return;
        const p = pointerXY(e);
        const dx = p.x - drag.startX;
        const onRight = drawerOnRight();
        const threshold = Math.abs(drag.closedX) * SNAP_RATIO;
        if (drag.wasOpen) {
          if ((onRight && dx > threshold) || (!onRight && dx < -threshold)) setOpen(false);
          else setOpen(true);
        } else if ((onRight && dx < -threshold) || (!onRight && dx > threshold)) {
          setOpen(true);
        } else {
          setOpen(false);
        }
        drag = null;
      }

      tab.addEventListener("click", () => {
        if (!drawer.classList.contains("is-open")) setOpen(true);
      });

      tab.addEventListener("touchstart", (e) => {
        if (!drawer.classList.contains("is-open")) beginDrag(e, "open");
      }, { passive: true });

      closeGrip?.addEventListener("touchstart", (e) => {
        if (drawer.classList.contains("is-open")) {
          e.stopPropagation();
          beginDrag(e, "close");
        }
      }, { passive: true });

      closeGrip?.addEventListener("mousedown", (e) => {
        if (!drawer.classList.contains("is-open")) return;
        e.preventDefault();
        beginDrag(e, "close");
      });

      backdrop?.addEventListener("click", () => setOpen(false));

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && drawer.classList.contains("is-open")) setOpen(false);
      });

      document.addEventListener(
        "touchstart",
        (e) => {
          if (drag || drawer.classList.contains("is-open")) return;
          if (e.touches.length !== 1) return;
          const x = e.touches[0].clientX;
          const onRight = drawerOnRight();
          if ((onRight && x >= window.innerWidth - EDGE_PX) || (!onRight && x <= EDGE_PX)) {
            beginDrag(e, "edge");
          }
        },
        { passive: true }
      );

      document.addEventListener("touchmove", moveDrag, { passive: true });
      document.addEventListener("touchend", endDrag);
      document.addEventListener("mousemove", (e) => {
        if (drag) moveDrag(e);
      });
      document.addEventListener("mouseup", endDrag);

      if (typeof paintMarketApplyDomI18n === "function") paintMarketApplyDomI18n(tab);
      tab.setAttribute("aria-label", paintMarketT("shop_filters_tab_aria"));
    }

    PaintTheme.paintShopFilterRow();
    initShopInfoDropdown();
    initShopFilterDrawer();

    (async () => {
      const errorBox = document.getElementById("errorBox");
      if (!slug) {
        errorBox.textContent = paintMarketT("shop_err_slug");
        errorBox.classList.remove("hidden");
        return;
      }
      try {
        const data = await PaintApi.shopPublic(slug);
        const shop = data.shop;
        document.getElementById("shopName").textContent = shop.name;
        const shopFavBtn = document.getElementById("shopFavBtn");
        if (shopFavBtn && shop.slug) {
          shopFavBtn.classList.remove("hidden");
          shopFavBtn.removeAttribute("aria-hidden");
          paintMarketFavoriteApplyButton(shopFavBtn, shop.slug, "inline");
        }
        const locEl = document.getElementById("locationText");
        const addrEl = document.getElementById("addressText");
        locEl.textContent = shop.location_text || "—";
        locEl.hidden = !String(shop.location_text || "").trim();
        addrEl.textContent = shop.address || "—";
        addrEl.hidden = !String(shop.address || "").trim();
        const phoneWrap = document.getElementById("phoneText");
        const phoneVal = document.getElementById("phoneTextValue");
        if (phoneWrap && phoneVal) {
          phoneVal.textContent = shop.phone || "—";
          phoneWrap.hidden = !String(shop.phone || "").trim();
        }
        document.getElementById("lastUpdated").textContent =
          shop.last_catalog_update || paintMarketT("index_last_update_na");
        setupPublicShopLinks(shop);
        const heroSrc = shop.photo_url || `https://placehold.co/1200x400/064e3b/f8fafc?text=${encodeURIComponent(shop.name)}`;
        heroImg.src = heroSrc;
        listings = data.listings || [];
        shopCustomColors = data.customColors || [];
        shopPageHydrated = true;
        initBrandPrism();
        initCategoryPrism();
        initCapacityPrism();
        scrollProductsOnFilter = true;
      } catch (e) {
        errorBox.textContent =
          e.message === "Forbidden"
            ? paintMarketT("shop_err_forbidden")
            : e.message || paintMarketT("shop_err_load");
        errorBox.classList.remove("hidden");
      }
    })();

    document.addEventListener("paint-market-lang-change", () => {
      if (!shopPageHydrated) document.getElementById("shopName").textContent = paintMarketT("shop_loading");
      translateShopPills();
      if (brandPrism) brandPrism.render();
      if (categoryPrism) categoryPrism.render();
      if (capacityPrism) capacityPrism.render();
      renderList();
    });

    document.addEventListener("paint-market-favorites-change", () => {
      const fb = document.getElementById("shopFavBtn");
      const sl = fb && fb.getAttribute("data-shop-slug");
      if (fb && sl) paintMarketFavoriteApplyButton(fb, sl, "inline");
    });
  </script>
</body>
