<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop showroom</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/paint/css/shop-photo-frame.css" />
  <link rel="stylesheet" href="/paint/css/paint-market-ui.css" />
  <style>body { font-family: "DM Sans", system-ui, sans-serif; }</style>
</head>
<body class="bg-gradient-to-b from-slate-950 via-slate-900 to-slate-100 text-slate-900 min-h-screen" data-pm-page-title="shop_metaTitle">
  <header class="border-b border-white/20 bg-slate-950/80 backdrop-blur">
    <div class="max-w-6xl mx-auto px-4 py-4 flex flex-wrap gap-3 items-center justify-between">
      <div class="flex flex-wrap items-start gap-x-3 gap-y-2 min-w-0">
        <button type="button" class="pm-geo-compact-btn md:hidden shrink-0 mt-1" aria-label="Country, city &amp; language">
          <span class="pm-geo-compact-inner">
            <span class="pm-geo-compact-flag" aria-hidden="true"></span>
            <span class="pm-geo-compact-sep" aria-hidden="true">·</span>
            <span class="pm-geo-sym-city" aria-hidden="true">⌖</span>
            <span class="pm-geo-compact-sep" aria-hidden="true">·</span>
            <span class="pm-geo-sym-lang" aria-hidden="true">En</span>
          </span>
        </button>
        <div class="pm-geo-bar-desktop hidden md:flex flex-wrap items-center gap-x-5 gap-y-2">
          <label class="pm-country-field flex items-center gap-2 shrink-0">
            <span class="text-[11px] font-semibold uppercase tracking-wide text-slate-300 whitespace-nowrap" data-pm-t="hdr_country">Country</span>
            <span class="pm-select-with-flag pm-select-with-flag--header">
              <span class="pm-country-flag" aria-hidden="true"></span>
              <select
                class="paint-market-country paint-market-header-select rounded-lg border border-white/20 text-sm py-1.5 pe-2.5 ps-9 shadow-sm focus:ring-2 focus:ring-teal-500/50"
                aria-label="Country"
              ></select>
            </span>
          </label>
          <label class="flex items-center gap-2 shrink-0">
            <span class="text-[11px] font-semibold uppercase tracking-wide text-slate-300 whitespace-nowrap" data-pm-t="hdr_city">City</span>
            <select
              class="paint-market-city paint-market-header-select rounded-lg border border-white/20 text-sm px-2.5 py-1.5 min-w-[9rem] shadow-sm focus:ring-2 focus:ring-teal-500/50"
              aria-label="City"
            ></select>
          </label>
          <label class="flex items-center gap-2 shrink-0">
            <span class="text-[11px] font-semibold uppercase tracking-wide text-slate-300 whitespace-nowrap" data-pm-t="hdr_language">Language</span>
            <select
              class="paint-market-lang paint-market-header-select rounded-lg border border-white/20 text-sm px-2.5 py-1.5 min-w-[6.5rem] shadow-sm focus:ring-2 focus:ring-teal-500/50"
              aria-label="Language"
            ></select>
          </label>
        </div>
        <div class="flex min-w-0 flex-wrap items-start gap-x-3 gap-y-1">
          <div class="min-w-0 flex-1">
            <p class="text-xs uppercase tracking-wide text-slate-300" data-pm-t="shop_hdr_sub">Virtual showroom</p>
            <h1 id="shopName" class="text-2xl font-semibold text-white">Loading…</h1>
          </div>
          <button
            type="button"
            id="shopFavBtn"
            class="paint-market-fav-btn hidden"
            aria-hidden="true"
          ></button>
        </div>
      </div>
      <div class="text-sm flex gap-3">
        <a class="px-3 py-1.5 rounded-lg border border-white/20 text-slate-200" href="/paint/" data-pm-t="shop_browse">Browse shops</a>
        <a class="px-3 py-1.5 rounded-lg bg-teal-500 text-slate-950 font-semibold" href="/paint/login.html" data-pm-t="shop_shop_login">Shop login</a>
      </div>
    </div>
  </header>

  <main class="max-w-[min(1920px,100%)] mx-auto px-3 sm:px-4 py-8 space-y-8">
    <div class="flex flex-col lg:flex-row lg:items-stretch gap-4 w-full max-w-full lg:w-fit">
      <section class="pm-shop-hero rounded-2xl p-2.5 sm:p-3 w-fit max-w-full min-w-0 flex-1 lg:flex-initial flex flex-col h-full lg:min-h-0">
        <div class="pm-shop-hero-layout">
          <div class="pm-shop-hero-col pm-shop-hero-col--photo">
            <div class="shop-photo-frame pm-shop-hero-photo-frame">
              <img id="heroImg" alt="" class="shop-photo-frame__img" loading="lazy" />
            </div>
          </div>
          <div class="pm-shop-hero-col pm-shop-hero-col--info">
            <div class="pm-shop-hero-meta" aria-label="Shop details">
              <p id="locationText" class="pm-shop-hero-meta__line"></p>
              <p id="addressText" class="pm-shop-hero-meta__line"></p>
              <p class="pm-shop-hero-meta__line pm-shop-hero-meta__line--muted">
                <span data-pm-t="index_last_update">Last update:</span>
                <span id="lastUpdated"></span>
              </p>
            </div>
            <div id="shopMapInfo" class="pm-shop-hero-map-actions" hidden>
              <a
                id="openExtMap"
                href="#"
                target="_blank"
                rel="noopener noreferrer"
                class="pm-shop-hero-map-btn"
                data-pm-t="shop_map_hint"
              >Show on map</a>
              <a
                id="openDirectionsMap"
                href="#"
                target="_blank"
                rel="noopener noreferrer"
                class="pm-shop-hero-map-btn pm-shop-hero-map-btn--dir"
                data-pm-t="shop_get_directions"
              >Get directions</a>
            </div>
          </div>
        </div>
      </section>
      <div
        id="popularPickWrap"
        class="pm-shop-panel hidden shrink-0 rounded-2xl px-2.5 py-2 sm:px-3 sm:py-2.5 w-full max-w-full sm:w-auto sm:max-w-[19rem] lg:w-[min(100%,19rem)] flex flex-col h-full min-h-0 lg:min-h-full self-stretch"
      >
        <div class="shrink-0">
          <p class="pm-shop-panel-title" data-pm-t="shop_popular_here">Popular here</p>
          <p class="text-[10px] text-slate-500 mb-2" data-pm-t="shop_popular_sub">From customer taps in this showroom</p>
        </div>
        <div id="popularPickStrip" class="flex-1 min-h-[10rem] lg:min-h-0 grid grid-cols-3 gap-2 min-w-0 w-full [grid-template-rows:repeat(2,minmax(0,1fr))]"></div>
      </div>
    </div>

    <div id="errorBox" class="hidden rounded-xl border border-rose-200 bg-rose-50 text-rose-800 px-4 py-3 text-sm"></div>

    <section class="pm-shop-listing-section space-y-3">
      <div class="flex flex-wrap gap-3 items-start justify-between">
        <div>
          <h2 class="text-xl" data-pm-t="shop_listed_h2">Listed products</h2>
          <p class="text-sm text-slate-600 max-w-3xl" data-pm-t="shop_listed_sub">Default order favours popular SKUs; change the sort or filter chips to explore.</p>
        </div>
        <label class="text-xs font-semibold text-slate-600 flex items-center gap-2">
          <span data-pm-t="shop_sort">Sort</span>
          <select id="sortSelect" class="rounded-full border border-slate-200 bg-white px-3 py-1 text-xs font-semibold"></select>
        </label>
      </div>
      <div class="flex flex-wrap gap-2 text-xs font-semibold">
        <button data-quick="building_paints" type="button" class="pill px-3 py-1 rounded-full bg-white border border-slate-200">Building</button>
        <button data-quick="steel_workshop_paints" type="button" class="pill px-3 py-1 rounded-full bg-white border border-slate-200">Steel</button>
        <button data-quick="carpentry_workshop_paints" type="button" class="pill px-3 py-1 rounded-full bg-white border border-slate-200">Wood</button>
        <button data-quick="thinner" type="button" class="pill px-3 py-1 rounded-full bg-white border border-slate-200">Thinner</button>
        <button data-quick="industrial" type="button" class="pill px-3 py-1 rounded-full bg-white border border-slate-200">Industrial</button>
        <button data-quick="" type="button" class="pill px-3 py-1 rounded-full bg-teal-800 text-white">All</button>
      </div>
      <div id="listingMount" class="space-y-4"></div>
    </section>
  </main>

  <footer class="max-w-6xl mx-auto px-4 pb-12 text-xs text-slate-500" data-pm-t="shop_footer">Information only—purchase directly from the retailer.</footer>

  <script src="/paint/js/paint-i18n.js"></script>
  <script src="/paint/js/ral-colors.js"></script>
  <script src="/paint/js/common.js"></script>
  <script src="/paint/js/theme.js"></script>
  <script>
    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, (c) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[c]));
    }

    const params = new URLSearchParams(location.search);
    const slug = params.get("slug");
    const heroImg = document.getElementById("heroImg");
    const listingMount = document.getElementById("listingMount");

    function setupPublicShopLinks(shop) {
      const sec = document.getElementById("shopMapInfo");
      const link = document.getElementById("openExtMap");
      const dir = document.getElementById("openDirectionsMap");
      if (!sec || !link || !dir) return false;
      const locationQuery = [shop.name, shop.location_text, shop.address].filter(Boolean).join(", ");
      if (!locationQuery) return false;
      sec.hidden = false;
      const mlat = shop.lat != null ? Number(shop.lat) : NaN;
      const mlng = shop.lng != null ? Number(shop.lng) : NaN;
      if (Number.isFinite(mlat) && Number.isFinite(mlng)) {
        link.href = `https://www.google.com/maps?q=${encodeURIComponent(mlat)},${encodeURIComponent(mlng)}`;
        dir.href = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(`${mlat},${mlng}`)}`;
      } else {
        const encodedQuery = encodeURIComponent(locationQuery);
        link.href = `https://www.google.com/maps/search/?api=1&query=${encodedQuery}`;
        dir.href = `https://www.google.com/maps/dir/?api=1&destination=${encodedQuery}`;
      }
      return true;
    }
    let listings = [];
    let shopCustomColors = [];
    let categoryFilter = "";
    let sortMode = "popular";
    let shopPageHydrated = false;

    const SHOP_SORT_VALUES = ["popular", "price-asc", "price-desc", "name"];
    const SHOP_PILL_I18N = {
      building_paints: "shop_pill_building",
      steel_workshop_paints: "shop_pill_steel",
      carpentry_workshop_paints: "shop_pill_carpentry",
      thinner: "shop_pill_thinner",
      industrial: "shop_pill_industrial",
      "": "shop_pill_all"
    };

    function refillShopSortSelect() {
      const sel = document.getElementById("sortSelect");
      if (!sel) return;
      const prev = sel.value || sortMode;
      sel.innerHTML = [
        ["popular", "shop_sort_popular"],
        ["price-asc", "shop_sort_price_asc"],
        ["price-desc", "shop_sort_price_desc"],
        ["name", "shop_sort_name"]
      ]
        .map(([val, key]) => `<option value="${val}">${esc(paintMarketT(key))}</option>`)
        .join("");
      const next = SHOP_SORT_VALUES.includes(prev) ? prev : "popular";
      sel.value = next;
      sortMode = next;
    }

    function translateShopPills() {
      document.querySelectorAll(".pill").forEach((btn) => {
        const q = btn.getAttribute("data-quick") ?? "";
        const key =
          Object.prototype.hasOwnProperty.call(SHOP_PILL_I18N, q) ? SHOP_PILL_I18N[q] : null;
        if (!key) return;
        const label = paintMarketT(key);
        const iconUrl = q ? paintMarketCategoryIconUrl(q) : "";
        if (iconUrl) {
          btn.classList.add("pill--with-icon");
          btn.innerHTML = `<img class="shop-pill-icon" src="${esc(iconUrl)}" alt="" loading="lazy" /><span>${esc(label)}</span>`;
        } else {
          btn.classList.remove("pill--with-icon");
          btn.textContent = label;
        }
      });
    }

    refillShopSortSelect();
    document.getElementById("shopName").textContent = paintMarketT("shop_loading");

    async function activate(card, listingId) {
      card.classList.add("ring-2", "ring-teal-600");
      await PaintApi.trackListing(listingId);
    }

    /** One row per SKU (capacity); group by master product for “popular picks”. */
    function computePopularPickRows(listings, limit = 6) {
      const byPid = new Map();
      for (const row of listings) {
        const pid = row.master_product_id;
        if (pid == null) continue;
        let agg = byPid.get(pid);
        const v = Number(row.view_count || 0);
        if (!agg) {
          agg = { viewsSum: v, listingId: row.id, anchor: row };
          byPid.set(pid, agg);
        } else {
          agg.viewsSum += v;
          if (v > Number(agg.anchor.view_count || 0)) {
            agg.anchor = row;
            agg.listingId = row.id;
          }
        }
      }
      const rows = [...byPid.values()].map((agg) => ({
        listingId: agg.listingId,
        productName: agg.anchor.product_name,
        imageUrl: agg.anchor.default_image_url || "",
        capacityLtr: agg.anchor.capacity_ltr,
        priceAmount: agg.anchor.price_amount,
        currency: agg.anchor.currency,
        ralCode: agg.anchor.ral_code || "",
        shopViews: agg.viewsSum,
        popularityScore: Number(agg.anchor.popularity_score || 0),
        categorySlug: agg.anchor.category_slug || "",
      }));
      rows.sort((a, b) => {
        if (b.shopViews !== a.shopViews) return b.shopViews - a.shopViews;
        return b.popularityScore - a.popularityScore;
      });
      return rows.slice(0, limit);
    }

    function renderPopularPickStrip(rows) {
      const wrap = document.getElementById("popularPickWrap");
      const strip = document.getElementById("popularPickStrip");
      if (!wrap || !strip) return;
      strip.innerHTML = "";
      if (!rows.length) {
        wrap.classList.add("hidden");
        return;
      }
      wrap.classList.remove("hidden");
      for (const row of rows) {
        const tip =
          row.shopViews > 0
            ? `${row.productName} — ${row.shopViews} showroom tap${row.shopViews === 1 ? "" : "s"}`
            : `${row.productName} — trending in catalogue`;
        const btn = document.createElement("button");
        btn.type = "button";
        btn.title = tip;
        const catMark = PaintTheme.shopListingAccentStyle(row.categorySlug || "");
        btn.className =
          "pm-shop-popular-tile group aspect-square h-full w-full min-h-0 min-w-0 flex flex-col rounded-lg border border-slate-200 border-t-[3px] bg-white overflow-hidden hover:shadow-md transition cursor-pointer select-none outline-none ring-offset-white focus-visible:ring-2 focus-visible:ring-teal-500 text-left";
        btn.style.borderTopColor = catMark.insetBar;
        btn.innerHTML = shopProductCardBodyHtml(row);
        btn.addEventListener("click", () => goToListing(row.listingId, row.categorySlug));
        strip.appendChild(btn);
      }
    }

    function goToListing(listingId, categorySlugHint) {
      if (listingId == null) return;
      PaintApi.trackListing(listingId).catch(() => {});
      categoryFilter = categorySlugHint || "";
      renderList();
      PaintTheme.paintShopFilterRow();
      const focusCard = () => {
        const el = document.querySelector(`article[data-listing-id="${listingId}"]`);
        if (!el) return false;
        el.scrollIntoView({ behavior: "smooth", block: "center" });
        el.classList.add("ring-2", "ring-teal-400", "ring-offset-2", "ring-offset-slate-100");
        window.setTimeout(() => {
          el.classList.remove("ring-2", "ring-teal-400", "ring-offset-2", "ring-offset-slate-100");
        }, 2200);
        return true;
      };
      requestAnimationFrame(() => {
        if (focusCard()) return;
        categoryFilter = "";
        renderList();
        PaintTheme.paintShopFilterRow();
        requestAnimationFrame(() => focusCard());
      });
    }

    function sortRows(rows) {
      const next = [...rows];
      if (sortMode === "price-asc") next.sort((a, b) => Number(a.price_amount) - Number(b.price_amount));
      if (sortMode === "price-desc") next.sort((a, b) => Number(b.price_amount) - Number(a.price_amount));
      if (sortMode === "name") next.sort((a, b) => a.product_name.localeCompare(b.product_name));
      if (sortMode === "popular") {
        next.sort((a, b) => {
          const scoreA = Number(a.popularity_score || 0) + Number(a.view_count || 0);
          const scoreB = Number(b.popularity_score || 0) + Number(b.view_count || 0);
          return scoreB - scoreA;
        });
      }
      return next;
    }

    function formatCapacityLtr(v) {
      const n = Number(v);
      return Number.isFinite(n) ? String(n) : String(v ?? "");
    }

    /** Same inner markup as main grid: photo (price / capacity / RAL) | product name. */
    function shopProductCardBodyHtml(row) {
      const rawImg = row.default_image_url || row.imageUrl || "";
      const productName = row.product_name || row.productName || "";
      const imgSrc = rawImg
        ? esc(rawImg)
        : esc(
            `https://placehold.co/128x128/f1f5f9/64748b/png?text=${encodeURIComponent(String(productName || "•").slice(0, 2).toUpperCase())}`
          );
      const cap = formatCapacityLtr(row.capacity_ltr ?? row.capacityLtr);
      const cur = row.currency || (typeof paintMarketCurrencyGet === "function" ? paintMarketCurrencyGet() : "AED");
      const amt = row.price_amount ?? row.priceAmount;
      const priceStr =
        amt != null && amt !== ""
          ? typeof paintMarketFormatPrice === "function"
            ? paintMarketFormatPrice(amt, cur)
            : String(amt)
          : "";
      const photoOverlays =
        typeof paintMarketListingPhotoOverlaysHtml === "function"
          ? paintMarketListingPhotoOverlaysHtml(
              {
                price_amount: amt,
                currency: cur,
                capacity_ltr: row.capacity_ltr ?? row.capacityLtr,
                ral_code: row.ral_code ?? row.ralCode
              },
              esc,
              shopCustomColors,
              { formatPrice: () => priceStr, formatCapacity: () => `${cap}L`, hidePrice: !priceStr }
            )
          : priceStr
            ? `<span class="pm-card-photo-overlay pm-card-photo-overlay--price">${esc(priceStr)}</span>`
            : "";
      return `
          <div class="flex-1 flex gap-px min-h-0 overflow-hidden p-0 bg-white">
            <div class="w-[50%] max-w-[4.5rem] shrink-0 self-stretch flex min-h-0 items-stretch relative z-10">
              <div class="h-full aspect-square max-w-full min-h-0 overflow-hidden relative pm-card-photo-frame pm-card-photo-frame--shop-split" style="--pm-card-photo-inset:0.28rem">
                ${photoOverlays}
                <img src="${imgSrc}" alt="" loading="lazy" />
              </div>
            </div>
            <div class="flex-1 min-w-0 min-h-0 flex flex-col justify-center gap-px overflow-hidden leading-tight pr-0.5">
              <p class="pm-shop-product-card__name text-[11px] sm:text-[12px] font-semibold text-slate-900 line-clamp-2 leading-snug">${esc(productName)}</p>
            </div>
          </div>`;
    }

    function renderList() {
      listingMount.innerHTML = "";
      if (!listings.length) {
        listingMount.innerHTML = `<p class="text-sm text-slate-500">${esc(paintMarketT("shop_empty_listings"))}</p>`;
        return;
      }
      const filtered = sortRows(
        listings.filter((l) => {
          if (!categoryFilter) return true;
          return (l.category_slug || "") === categoryFilter;
        })
      );
      if (!filtered.length) {
        listingMount.innerHTML = `<p class="text-sm text-slate-500">${esc(paintMarketT("shop_empty_filter"))}</p>`;
        return;
      }
      let brandGrid = null;
      let currentBrand = null;
      for (const row of filtered) {
        const brandHeading = `${row.brand_order}-${row.brand_name}`;
        if (brandHeading !== currentBrand) {
          currentBrand = brandHeading;
          const divider = PaintTheme.shopBrandDivider(row.brand_slug || "", row.brand_name);
          listingMount.appendChild(divider);
          brandGrid = document.createElement("div");
          brandGrid.className =
            "grid grid-cols-[repeat(auto-fill,minmax(5.1rem,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(6rem,1fr))] md:grid-cols-[repeat(auto-fill,minmax(6.6rem,1fr))] lg:grid-cols-[repeat(auto-fill,minmax(7.2rem,1fr))] gap-1";
          listingMount.appendChild(brandGrid);
        }
        const card = document.createElement("article");
        const catMark = PaintTheme.shopListingAccentStyle(row.category_slug || "");
        card.className =
          "group aspect-square flex flex-col rounded-lg border border-slate-200 border-t-[3px] bg-white overflow-hidden hover:shadow-md transition cursor-pointer select-none";
        card.dataset.listingId = String(row.id);
        card.style.borderTopColor = catMark.insetBar;
        card.innerHTML = shopProductCardBodyHtml(row);
        card.addEventListener("click", () => activate(card, row.id));
        brandGrid.appendChild(card);
      }
    }

    document.querySelectorAll(".pill").forEach((btn) => {
      btn.addEventListener("click", () => {
        categoryFilter = btn.getAttribute("data-quick") || "";
        renderList();
      });
    });

    document.getElementById("sortSelect").addEventListener("change", (e) => {
      sortMode = e.target.value;
      renderList();
    });

    PaintTheme.paintShopFilterRow();

    (async () => {
      const errorBox = document.getElementById("errorBox");
      if (!slug) {
        errorBox.textContent = paintMarketT("shop_err_slug");
        errorBox.classList.remove("hidden");
        return;
      }
      try {
        const data = await PaintApi.shopPublic(slug);
        const shop = data.shop;
        document.getElementById("shopName").textContent = shop.name;
        const shopFavBtn = document.getElementById("shopFavBtn");
        if (shopFavBtn && shop.slug) {
          shopFavBtn.classList.remove("hidden");
          shopFavBtn.removeAttribute("aria-hidden");
          paintMarketFavoriteApplyButton(shopFavBtn, shop.slug, "inline");
        }
        const locEl = document.getElementById("locationText");
        const addrEl = document.getElementById("addressText");
        locEl.textContent = shop.location_text || "—";
        locEl.hidden = !String(shop.location_text || "").trim();
        addrEl.textContent = shop.address || "—";
        addrEl.hidden = !String(shop.address || "").trim();
        document.getElementById("lastUpdated").textContent =
          shop.last_catalog_update || paintMarketT("index_last_update_na");
        setupPublicShopLinks(shop);
        const heroSrc = shop.photo_url || `https://placehold.co/1200x400/064e3b/f8fafc?text=${encodeURIComponent(shop.name)}`;
        heroImg.src = heroSrc;
        listings = data.listings || [];
        shopCustomColors = data.customColors || [];
        shopPageHydrated = true;
        renderList();
        renderPopularPickStrip(computePopularPickRows(listings, 6));
      } catch (e) {
        errorBox.textContent =
          e.message === "Forbidden"
            ? paintMarketT("shop_err_forbidden")
            : e.message || paintMarketT("shop_err_load");
        errorBox.classList.remove("hidden");
      }
    })();

    document.addEventListener("paint-market-lang-change", () => {
      if (!shopPageHydrated) document.getElementById("shopName").textContent = paintMarketT("shop_loading");
      refillShopSortSelect();
      translateShopPills();
      renderList();
    });

    document.addEventListener("paint-market-favorites-change", () => {
      const fb = document.getElementById("shopFavBtn");
      const sl = fb && fb.getAttribute("data-shop-slug");
      if (fb && sl) paintMarketFavoriteApplyButton(fb, sl, "inline");
    });
  </script>
